<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 내 마음은?</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #5BA4CF;
            --sky-lt: #E8F4FD;
            --green: #3A9E6E;
            --green-lt: #E6F7EF;
            --purple: #7B68C8;
            --purple-lt: #EDE9FA;
            --red: #E05C5C;
            --red-lt: #FDE8E8;
            --yellow: #F5C842;
            --dark: #2C3E50;
            --mid: #7F8C8D;
            --border: #E8EAF0;
            --bg: #F7F9FC;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }

        /* Header */
        .header {
            background: var(--sky);
            padding: 20px 20px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute; bottom: -16px; left: 0; right: 0;
            height: 32px; background: var(--bg);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }
        .header-time {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            color: #fff; font-size: 12px; font-weight: 600;
            padding: 4px 12px; border-radius: 20px; margin-bottom: 8px;
        }
        .header-title { color: #fff; font-size: 22px; font-weight: 900; margin-bottom: 4px; }
        .header-sub { color: rgba(255,255,255,0.85); font-size: 13px; }

        .container { padding: 24px 16px 40px; max-width: 480px; margin: 0 auto; }

        /* Tabs */
        .tab-bar { display: flex; gap: 0; margin-bottom: 20px; background: #fff; border-radius: 12px; padding: 4px; border: 1px solid var(--border); }
        .tab-btn {
            flex: 1; padding: 10px; border: none; background: none;
            font-size: 13px; font-weight: 600; font-family: inherit;
            cursor: pointer; border-radius: 8px; color: var(--mid);
            transition: all 0.15s;
        }
        .tab-btn.active { background: var(--sky); color: #fff; }

        .form-view, .friends-view { display: none; }
        .form-view.show, .friends-view.show { display: block; }

        /* Sections */
        .card, .name-section { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 16px; border: 1px solid var(--border); }
        .section-label { font-size: 13px; font-weight: 700; color: var(--dark); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        
        .name-input {
            width: 100%; padding: 12px 16px;
            border: 2px solid var(--border); border-radius: 12px;
            font-size: 16px; font-family: inherit; font-weight: 700;
            outline: none; transition: border-color 0.2s;
            background: var(--bg);
        }
        .name-input:focus { border-color: var(--sky); background: #fff; }
        .name-hint { font-size: 11px; color: var(--mid); margin-top: 6px; line-height: 1.5; }
        .name-hint b { color: var(--red); }

        /* Emoji Grid */
        .emoji-row { display: flex; gap: 8px; justify-content: space-between; }
        .emoji-btn {
            flex: 1; padding: 10px 4px 8px;
            border: 2px solid var(--border); border-radius: 14px;
            background: var(--bg); cursor: pointer;
            text-align: center; transition: all 0.15s;
        }
        .emoji-btn.active { border-color: var(--sky); background: var(--sky-lt); }
        .emoji-btn .face { font-size: 28px; display: block; margin-bottom: 4px; }
        .emoji-btn .label { font-size: 10px; color: var(--mid); font-weight: 600; }
        .emoji-btn.active .label { color: var(--sky); }

        /* Chips */
        .emotion-group { margin-bottom: 14px; }
        .emotion-group-title { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; display: inline-block; margin-bottom: 8px; }
        .pos-title  { background: var(--green-lt); color: var(--green); }
        .calm-title { background: var(--purple-lt); color: var(--purple); }
        .neg-title  { background: var(--red-lt); color: var(--red); }
        .word-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .word-chip {
            padding: 6px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
            border: 1.5px solid var(--border);
            background: var(--bg); color: var(--mid);
            cursor: pointer; transition: all 0.15s;
        }
        .word-chip.active.pos  { background: var(--green-lt); border-color: var(--green); color: var(--green); }
        .word-chip.active.calm { background: var(--purple-lt); border-color: var(--purple); color: var(--purple); }
        .word-chip.active.neg  { background: var(--red-lt); border-color: var(--red); color: var(--red); }

        /* Energy */
        .energy-display { text-align: center; margin-bottom: 10px; }
        .energy-number { font-size: 42px; font-weight: 900; color: var(--sky); line-height: 1; }
        .energy-desc { font-size: 12px; color: var(--mid); margin-top: 2px; }
        .energy-slider { width: 100%; margin: 4px 0 8px; accent-color: var(--sky); }
        .energy-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--mid); }

        /* Friends Grid */
        .friends-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 12px; }
        .friend-card {
            background: var(--bg); border-radius: 12px;
            padding: 12px 10px; text-align: center;
            border: 1px solid var(--border);
        }
        .friend-face { font-size: 28px; margin-bottom: 4px; }
        .friend-name { font-size: 13px; font-weight: 700; color: var(--dark); }
        .friend-energy-bar { height: 4px; background: var(--border); border-radius: 2px; margin: 6px 0; overflow: hidden; }
        .friend-energy-fill { height: 100%; background: var(--sky); transition: width 0.4s; }
        .friend-words { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; margin-top: 6px; }
        .friend-word { font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 600; }
        
        /* Submit Button */
        .submit-btn {
            width: 100%; padding: 16px;
            background: var(--sky); color: #fff;
            border: none; border-radius: 16px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.15s; margin-bottom: 24px;
        }
        .submit-btn:disabled { background: var(--border); color: var(--mid); cursor: not-allowed; }

        /* Badges */
        .time-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; margin-left: 6px; }
        .morning-badge { background: #FFF8E1; color: #F57F17; }
        .evening-badge { background: #E8EAF6; color: #283593; }

        .done-screen { display: none; text-align: center; padding: 40px 20px; }
        .done-screen.show { display: block; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-time" id="headerTime">🌅 아침 기록</div>
    <div class="header-title">오늘 내 마음은? 💭</div>
    <div class="header-sub" id="headerDate"></div>
</div>

<div class="container">
    <div class="tab-bar">
        <button class="tab-btn active" id="tab-form" onclick="switchTab('form')">📝 내 감정 기록</button>
        <button class="tab-btn" id="tab-friends" onclick="switchTab('friends')">👀 친구들 기분</button>
    </div>

    <div id="formView" class="form-view show">
        <div class="name-section">
            <div class="section-label">👤 내 이름을 입력해요</div>
            <input type="text" class="name-input" id="nameInput" placeholder="예) 김민준" maxlength="10">
            <div class="name-hint">
                <b>⚠️ 주의!</b> 성+이름 붙여서 입력해요 (예: 김민준 O / 김 민준 X)
            </div>
        </div>

        <div class="card">
            <div class="section-label">😊 지금 내 표정은?</div>
            <div class="emoji-row" id="emojiRow">
                <button class="emoji-btn" data-emoji="😄" onclick="selectEmoji(this)">
                    <span class="face">😄</span><span class="label">신나요</span>
                </button>
                <button class="emoji-btn" data-emoji="🙂" onclick="selectEmoji(this)">
                    <span class="face">🙂</span><span class="label">좋아요</span>
                </button>
                <button class="emoji-btn" data-emoji="😐" onclick="selectEmoji(this)">
                    <span class="face">😐</span><span class="label">보통이에요</span>
                </button>
                <button class="emoji-btn" data-emoji="😟" onclick="selectEmoji(this)">
                    <span class="face">😟</span><span class="label">힘들어요</span>
                </button>
                <button class="emoji-btn" data-emoji="😢" onclick="selectEmoji(this)">
                    <span class="face">😢</span><span class="label">슬퍼요</span>
                </button>
            </div>
        </div>

        <div class="card">
            <div class="section-label">💬 지금 느껴지는 감정은?</div>
            <div class="emotion-group">
                <span class="emotion-group-title pos-title">😊 긍정</span>
                <div class="word-chips" id="posChips"></div>
            </div>
            <div class="emotion-group">
                <span class="emotion-group-title calm-title">😌 고요한</span>
                <div class="word-chips" id="calmChips"></div>
            </div>
            <div class="emotion-group" style="margin-bottom:0">
                <span class="emotion-group-title neg-title">😟 부정</span>
                <div class="word-chips" id="negChips"></div>
            </div>
        </div>

        <div class="card">
            <div class="section-label">⚡ 오늘 에너지는 몇 점?</div>
            <div class="energy-display">
                <div class="energy-number" id="energyNum">5</div>
                <div class="energy-desc" id="energyDesc">보통이에요</div>
            </div>
            <input type="range" class="energy-slider" id="energySlider" min="1" max="10" value="5" step="1" oninput="updateEnergy(this.value)">
            <div class="energy-labels">
                <span>💤 1점 (지쳐요)</span>
                <span>⚡ 10점 (넘쳐요!)</span>
            </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitRecord()">기록 완료 ✓</button>

        <div class="done-screen" id="doneScreen">
            <div style="font-size: 64px; margin-bottom: 16px;">🎉</div>
            <h2 id="doneTitle" style="font-size: 22px; margin-bottom: 8px;">기록 완료!</h2>
            <p style="color: var(--mid); margin-bottom: 24px;">오늘 감정을 잘 기록했어요 🌟</p>
            <button class="submit-btn" style="background: var(--bg); color: var(--mid); border: 2px solid var(--border);" onclick="resetForm()">다시 기록하기</button>
        </div>
    </div>

    <div id="friendsView" class="friends-view">
        <div class="card">
            <div class="section-label">👀 우리 반 친구들 오늘 기분 
                <span class="time-badge morning-badge" id="friendsTimeBadge">🌅 아침</span>
            </div>
            <div class="friends-grid" id="friendsGrid">
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--mid);">데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>
</div>

<script>
    let selectedEmoji = '';
    let selectedWords = [];
    const energyDescs = ['', '지쳐요 💤', '많이 힘들어요', '조금 힘들어요', '좀 피곤해요', '보통이에요', '괜찮아요', '좋아요', '많이 좋아요', '활기차요', '넘쳐요! ⚡'];

    const wordsData = {
        pos: ['기뻐요', '신나요', '설레요', '뿌듯해요', '감사해요', '행복해요', '재미있어요', '에너지 넘쳐요'],
        calm: ['잔잔해요', '차분해요', '멍해요', '생각이 많아요', '집중돼요', '무덤덤해요', '쉬고 싶어요', '혼자이고 싶어요'],
        neg: ['슬퍼요', '화가 나요', '피곤해요', '걱정돼요', '무서워요', '짜증나요', '속상해요', '지루해요']
    };

    function init() {
        renderChips();
        updateTimeDisplay();
        updateEnergy(5);
    }

    function renderChips() {
        for (const type in wordsData) {
            const container = document.getElementById(type + 'Chips');
            wordsData[type].forEach(word => {
                const btn = document.createElement('button');
                btn.className = `word-chip ${type}`;
                btn.innerText = word;
                btn.onclick = () => {
                    btn.classList.toggle('active');
                    const idx = selectedWords.indexOf(word);
                    if (idx > -1) selectedWords.splice(idx, 1);
                    else selectedWords.push(word);
                };
                container.appendChild(btn);
            });
        }
    }

    function updateTimeDisplay() {
        const now = new Date();
        const hour = now.getHours();
        const isEvening = hour >= 12;
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        
        document.getElementById('headerDate').innerText = `${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
        const timeText = isEvening ? '🌙 하교 전 기록' : '🌅 아침 기록';
        document.getElementById('headerTime').innerText = timeText;
        document.getElementById('friendsTimeBadge').innerText = isEvening ? '🌙 하교 전' : '🌅 아침';
        document.getElementById('friendsTimeBadge').className = 'time-badge ' + (isEvening ? 'evening-badge' : 'morning-badge');
    }

    function switchTab(tab) {
        document.getElementById('tab-form').classList.toggle('active', tab === 'form');
        document.getElementById('tab-friends').classList.toggle('active', tab === 'friends');
        document.getElementById('formView').classList.toggle('show', tab === 'form');
        document.getElementById('friendsView').classList.toggle('show', tab === 'friends');
        if (tab === 'friends') loadFriends();
    }

    function selectEmoji(btn) {
        document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedEmoji = btn.dataset.emoji;
    }

    function updateEnergy(val) {
        document.getElementById('energyNum').innerText = val;
        document.getElementById('energyDesc').innerText = energyDescs[val];
    }

    function submitRecord() {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return alert('이름을 입력해주세요!');
        if (name.includes(' ')) return alert('이름에 공백 없이 입력해주세요!');
        if (!selectedEmoji) return alert('표정을 선택해주세요!');
        if (selectedWords.length === 0) return alert('감정 단어를 선택해주세요!');

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '저장 중...';

        const now = new Date();
        const data = {
            date: now.toLocaleDateString('ko-KR'),
            timeSlot: now.getHours() >= 12 ? '하교전' : '아침',
            name: name,
            emoji: selectedEmoji,
            words: selectedWords.join(', '),
            wordTypes: '', // Not strictly needed for basic display
            energy: document.getElementById('energySlider').value
        };

        if (typeof google !== 'undefined') {
            google.script.run
                .withSuccessHandler(() => {
                    showDone(name);
                })
                .saveEmotion(data);
        } else {
            setTimeout(() => showDone(name), 500);
        }
    }

    function showDone(name) {
        document.getElementById('submitBtn').style.display = 'none';
        document.querySelectorAll('.card, .name-section').forEach(el => el.style.display = 'none');
        document.getElementById('doneScreen').classList.add('show');
        document.getElementById('doneTitle').innerText = name + ' 기록 완료!';
    }

    function resetForm() {
        location.reload();
    }

    function loadFriends() {
        if (typeof google !== 'undefined') {
            google.script.run.withSuccessHandler(renderFriends).getEmotions();
        } else {
            renderFriends([
                {name: '홍길동', emoji: '😄', energy: 8, words: '신나요, 기뻐요', date: new Date().toLocaleDateString('ko-KR'), timeSlot: new Date().getHours() >= 12 ? '하교전' : '아침'}
            ]);
        }
    }

    function renderFriends(data) {
        const grid = document.getElementById('friendsGrid');
        const now = new Date();
        const today = now.toLocaleDateString('ko-KR');
        const currentSlot = now.getHours() >= 12 ? '하교전' : '아침';

        const filtered = data.filter(r => r.date === today && r.timeSlot === currentSlot);

        if (filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--mid);">아직 기록한 친구가 없어요.</div>';
            return;
        }

        grid.innerHTML = filtered.map(r => `
            <div class="friend-card">
                <div class="friend-face">${r.emoji}</div>
                <div class="friend-name">${r.name}</div>
                <div class="friend-energy-bar">
                    <div class="friend-energy-fill" style="width: ${r.energy * 10}%"></div>
                </div>
                <div style="font-size: 11px; color: var(--sky); font-weight: 700;">⚡ ${r.energy}점</div>
                <div class="friend-words">
                    ${r.words.split(', ').map(w => `<span class="friend-word" style="background: var(--sky-lt); color: var(--sky)">${w}</span>`).join('')}
                </div>
            </div>
        `).join('');
    }

    init();
</script>

</body>
</html>
